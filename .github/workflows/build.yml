name: Build

on:
  push:
    branches: ["main"]
    tags:
      - "v*"          # ← catches v1.0, v1.2.3, etc.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run --bun build